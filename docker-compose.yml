services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: docuro
      POSTGRES_USER: docuro
      POSTGRES_PASSWORD: docuro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO console: http://localhost:9001
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
